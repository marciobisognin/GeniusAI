name: GeniusAI Foresight CI

on:
  push:
    paths:
      - "geniusai-foresight/**"
      - ".github/workflows/geniusai-foresight-ci.yml"
  pull_request:
    paths:
      - "geniusai-foresight/**"
      - ".github/workflows/geniusai-foresight-ci.yml"

permissions:
  contents: read

# No event-controlled strings are interpolated into shell commands.
jobs:
  validate:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    defaults:
      run:
        working-directory: geniusai-foresight
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pinned QA tools
        run: python -m pip install --disable-pip-version-check build==1.3.0 bandit==1.8.6 pyflakes==3.4.0
      - name: Compile
        run: python -m compileall -q foresight scripts tests
      - name: Static analysis
        run: |
          pyflakes foresight scripts tests
          bandit -q -r foresight scripts
          python scripts/scan_secrets.py --root .
      - name: Validate squad
        run: python scripts/validate_squad.py --root .
      - name: Unit and integration tests
        run: python -m unittest discover -s tests -v
      - name: Build and inspect distribution
        run: |
          python -m build
          python - <<'PY'
          from pathlib import Path
          import zipfile
          wheel = next(Path("dist").glob("*.whl"))
          with zipfile.ZipFile(wheel) as archive:
              names = archive.namelist()
          assert any(name.endswith("LICENSE") for name in names), names
          PY
      - name: Install package and execute canonical demo
        run: |
          python -m pip install --force-reinstall --no-deps .
          geniusai-foresight validate --input examples/soy-trade-shock.json
          geniusai-foresight demo --output generated/ci-demo
      - name: Verify artifacts and deterministic replay
        run: |
          geniusai-foresight replay --input examples/soy-trade-shock.json --expected generated/ci-demo/result.json
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path("generated/ci-demo")
          for name in ("result.json", "report.md", "report.html"):
              path = root / name
              assert path.is_file() and path.stat().st_size > 100, name
          result = json.loads((root / "result.json").read_text(encoding="utf-8"))
          assert result["runs"] == 600
          assert len(result["workflow"]) == 8
          assert all("mcse" in item for item in result["event_uncertainty"].values())
          assert abs(sum(item["probability"] for item in result["scenarios"]) - 1.0) < 1e-9
          assert len(result["trace"]) == 24
          PY
