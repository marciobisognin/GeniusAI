# Regras de roteamento institucional do IFFar 3D Town.
#
# Gerado a partir da leitura da Portaria Eletrônica nº 876/2026 - GRE
# (Art. 1º — estrutura em businesses/iffar/org-chart.yaml — e Anexo I —
# atribuições em businesses/iffar/competencias.yaml). Diferente do
# org-chart e do competencias, este arquivo é curadoria manual (mapeia
# temas de negócio, não estrutura ou texto legal), então É esperado
# editá-lo à mão conforme o roteamento precisar evoluir.
#
# Como o motor usa isto (ver nirvana-bridge.ts):
#   1. Normaliza o briefing (minúsculas, sem acentos).
#   2. Pontua cada regra por nº de keywords casadas × prioridade.
#   3. A regra de maior score vence; empate ou nenhuma keyword => default_route.
#   4. cadeia_sistemica é uma lista de ids de businesses/iffar/org-chart.yaml,
#      sempre a partir da Reitoria ("1.1").
#   5. cadeia_campus é uma lista de NOMES (não ids) resolvidos em tempo de
#      execução dentro da subárvore do campus detectado no briefing — os
#      ids variam de campus para campus (nem toda unidade existe em todo
#      campus; campi menores usam a estrutura reduzida dos Arts. 114-120).
#      Sem campus explícito no briefing, a cadeia_campus é ignorada e o
#      fluxo permanece sistêmico (não há mais fallback para um campus
#      arbitrário).
version: 1
fonte: "Portaria Eletrônica nº 876/2026 - GRE, Anexo I"
default_route:
  nome: "Chefia de Gabinete do(a) Reitor(a) — triagem e despacho"
  cadeia_sistemica: ["1.1.4.3"]
  base_legal: ["Anexo I, Art. 15"]

rules:
  - tema: licitacoes-e-contratos
    keywords: ["licitacao", "licitacoes", "contrato", "contratos", "pregao", "dispensa",
               "edital", "termo de referencia", "lei 14133", "14.133", "compra", "compras"]
    prioridade: 10
    cadeia_sistemica: ["1.1.15", "1.1.15.3", "1.1.15.3.1"]
    cadeia_campus: ["Diretoria de Administração", "Coordenação de Licitações e Contratos"]
    base_legal: ["Anexo I, Arts. 38, 57, 58, 59, 92, 93"]

  - tema: fiscalizacao-contratual
