{
  "id": "select-game-form",
  "description": "select game form",
  "assigned_agent": "game-theory-modeler",
  "dependencies": [
    "profile-actors"
  ],
  "input_schema": [
    "actor_profiles",
    "study_spec"
  ],
  "output_schema": [
    "game_model"
  ],
  "validation_rules": [
    "schema_valid",
    "evidence_linked",
    "no_unlabeled_probability"
  ],
  "timeout_seconds": 600,
  "retry_policy": {
    "max_attempts": 2,
    "backoff_seconds": 5
  },
  "human_approval": false,
  "failure_behavior": "stop_and_report"
}
